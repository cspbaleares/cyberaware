<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="autoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0B0F19"/>
  
  <!-- Grid -->
  <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="1"/>
  </pattern>
  <rect width="400" height="300" fill="url(#grid4)"/>
  
  <!-- Central automation hub -->
  <g transform="translate(200, 150)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="10,5" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="20s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="50" fill="url(#autoGrad)"/>
    
    <!-- Zap icon -->
    <path d="M-5 -25 L-15 -5 L-5 -5 L-10 25 L15 -5 L5 -5 L10 -25 Z" fill="white"/>
    
    <!-- Connection points -->
    <circle cx="0" cy="-80" r="8" fill="#3B82F6"/>
    <circle cx="70" cy="-40" r="8" fill="#10B981"/>
    <circle cx="70" cy="40" r="8" fill="#F59E0B"/>
    <circle cx="0" cy="80" r="8" fill="#EF4444"/>
    <circle cx="-70" cy="40" r="8" fill="#8B5CF6"/>
    <circle cx="-70" cy="-40" r="8" fill="#06B6D4"/>
  </g>
  
  <!-- Trigger icons -->
  <g transform="translate(200, 50)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#1F2937" stroke="#3B82F6" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="bold">Trigger</text>
  </g>
  
  <g transform="translate(290, 110)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#1F2937" stroke="#10B981" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#10B981" font-size="12" font-weight="bold">Action</text>
  </g>
  
  <g transform="translate(290, 190)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#1F2937" stroke="#F59E0B" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="bold">Rule</text>
  </g>
  
  <g transform="translate(200, 250)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#1F2937" stroke="#EF4444" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="bold">Alert</text>
  </g>
  
  <g transform="translate(110, 190)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#1F2937" stroke="#8B5CF6" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#8B5CF6" font-size="12" font-weight="bold">Flow</text>
  </g>
  
  <g transform="translate(110, 110)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#1F2937" stroke="#06B6D4" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#06B6D4" font-size="12" font-weight="bold">Logic</text>
  </g>
  
  <!-- Connection lines -->
  <line x1="200" y1="65" x2="200" y2="70" stroke="#3B82F6" stroke-width="2"/>
  <line x1="260" y1="110" x2="250" y2="110" stroke="#10B981" stroke-width="2"/>
  <line x1="260" y1="190" x2="250" y2="190" stroke="#F59E0B" stroke-width="2"/>
  <line x1="200" y1="235" x2="200" y2="230" stroke="#EF4444" stroke-width="2"/>
  <line x1="140" y1="190" x2="150" y2="190" stroke="#8B5CF6" stroke-width="2"/>
  <line x1="140" y1="110" x2="150" y2="110" stroke="#06B6D4" stroke-width="2"/>
</svg>