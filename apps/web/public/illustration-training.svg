<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="eduGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0B0F19"/>
  
  <!-- Grid -->
  <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="1"/>
  </pattern>
  <rect width="400" height="300" fill="url(#grid3)"/>
  
  <!-- Central graduation cap -->
  <g transform="translate(200, 150)">
    <path d="M-60 -20 L0 -50 L60 -20 L0 10 Z" fill="url(#eduGrad)"/>
    <path d="M-60 -20 L-60 20 L0 50 L60 20 L60 -20" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <path d="M0 10 L0 50" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="0" cy="-50" r="5" fill="#06B6D4"/>
    <path d="M0 -50 Q30 -70 50 -50" fill="none" stroke="#06B6D4" stroke-width="2"/>
  </g>
  
  <!-- Course cards -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="#1F2937" stroke="#3B82F6" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" rx="4" fill="#3B82F6" opacity="0.5"/>
    <rect x="10" y="25" width="80" height="6" rx="3" fill="#6B7280"/>
    <rect x="10" y="35" width="60" height="6" rx="3" fill="#6B7280"/>
    <circle cx="85" cy="55" r="10" fill="#10B981"/>
    <path d="M80 55 L85 60 L92 50" fill="none" stroke="white" stroke-width="2"/>
  </g>
  
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="#1F2937" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" rx="4" fill="#8B5CF6" opacity="0.5"/>
    <rect x="10" y="25" width="80" height="6" rx="3" fill="#6B7280"/>
    <rect x="10" y="35" width="60" height="6" rx="3" fill="#6B7280"/>
    <circle cx="85" cy="55" r="10" fill="#F59E0B"/>
    <text x="85" y="59" text-anchor="middle" fill="white" font-size="10">75%</text>
  </g>
  
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="#1F2937" stroke="#10B981" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" rx="4" fill="#10B981" opacity="0.5"/>
    <rect x="10" y="25" width="80" height="6" rx="3" fill="#6B7280"/>
    <rect x="10" y="35" width="60" height="6" rx="3" fill="#6B7280"/>
    <circle cx="85" cy="55" r="10" fill="#10B981"/>
    <path d="M80 55 L85 60 L92 50" fill="none" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Progress bars -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="80" height="6" rx="3" fill="#1F2937"/>
    <rect x="0" y="0" width="60" height="6" rx="3" fill="#3B82F6"/>
  </g>
  
  <g transform="translate(270, 220)">
    <rect x="0" y="0" width="80" height="6" rx="3" fill="#1F2937"/>
    <rect x="0" y="0" width="45" height="6" rx="3" fill="#8B5CF6"/>
  </g>
</svg>