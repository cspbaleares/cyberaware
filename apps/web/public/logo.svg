<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" />
  
  <!-- Shield shape -->
  <path d="M100 25 L155 45 L155 100 C155 135 130 165 100 175 C70 165 45 135 45 100 L45 45 Z" 
        fill="url(#shieldGradient)" 
        stroke="#3B82F6" 
        stroke-width="2"
        filter="url(#glow)"/>
  
  <!-- Inner shield detail -->
  <path d="M100 40 L140 55 L140 100 C140 128 122 152 100 160 C78 152 60 128 60 100 L60 55 Z" 
        fill="none" 
        stroke="#60A5FA" 
        stroke-width="1.5"
        opacity="0.6"/>
  
  <!-- Lock icon -->
  <rect x="85" y="85" width="30" height="25" rx="3" fill="#10B981"/>
  <path d="M90 85 L90 75 C90 69.5 94.5 65 100 65 C105.5 65 110 69.5 110 75 L110 85" 
        fill="none" 
        stroke="#10B981" 
        stroke-width="4"
        stroke-linecap="round"/>
  <circle cx="100" cy="97.5" r="4" fill="#0F172A"/>
  <rect x="98" y="97.5" width="4" height="8" fill="#0F172A"/>
  
  <!-- Circuit lines -->
  <path d="M30 100 L45 100" stroke="#06B6D4" stroke-width="2" opacity="0.8"/>
  <path d="M155 100 L170 100" stroke="#06B6D4" stroke-width="2" opacity="0.8"/>
  <circle cx="30" cy="100" r="3" fill="#06B6D4"/>
  <circle cx="170" cy="100" r="3" fill="#06B6D4"/>
  
  <!-- Binary code decoration -->
  <text x="75" y="140" fill="#3B82F6" font-family="monospace" font-size="8" opacity="0.5">10110</text>
  <text x="115" y="140" fill="#8B5CF6" font-family="monospace" font-size="8" opacity="0.5">01001</text>
</svg>