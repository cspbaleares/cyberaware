<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="emailGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0B0F19"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="1"/>
  </pattern>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <!-- Shield -->
  <path d="M200 50 L280 80 L280 160 C280 210 245 250 200 270 C155 250 120 210 120 160 L120 80 Z" 
        fill="url(#shieldGrad)" opacity="0.9"/>
  
  <!-- Email icons -->
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="80" height="60" rx="8" fill="url(#emailGrad)" stroke="#3B82F6" stroke-width="2"/>
    <path d="M0 0 L40 35 L80 0" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="70" cy="15" r="8" fill="#EF4444"/>
    <text x="70" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="bold">!</text>
  </g>
  
  <g transform="translate(260, 100)">
    <rect x="0" y="0" width="80" height="60" rx="8" fill="url(#emailGrad)" stroke="#10B981" stroke-width="2"/>
    <path d="M0 0 L40 35 L80 0" fill="none" stroke="#10B981" stroke-width="2"/>
    <circle cx="70" cy="15" r="8" fill="#10B981"/>
    <path d="M66 15 L70 19 L76 11" fill="none" stroke="white" stroke-width="2"/>
  </g>
  
  <g transform="translate(160, 180)">
    <rect x="0" y="0" width="80" height="60" rx="8" fill="url(#emailGrad)" stroke="#F59E0B" stroke-width="2"/>
    <path d="M0 0 L40 35 L80 0" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="70" cy="15" r="8" fill="#F59E0B"/>
    <text x="70" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="bold">?</text>
  </g>
  
  <!-- Connection lines -->
  <path d="M140 150 L200 130 L260 130" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  <path d="M200 130 L200 180" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Central lock -->
  <g transform="translate(185, 105)">
    <rect x="0" y="15" width="30" height="25" rx="3" fill="#10B981"/>
    <path d="M5 15 L5 8 C5 4 8 1 15 1 C22 1 25 4 25 8 L25 15" fill="none" stroke="#10B981" stroke-width="3"/>
  </g>
</svg>